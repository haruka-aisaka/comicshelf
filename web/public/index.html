<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f1115">
  <title>comicshelf</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="topbar">
    <button id="menu-toggle" class="menu-toggle" type="button" aria-label="ディレクトリ一覧" aria-expanded="false">☰</button>
    <h1>comicshelf</h1>
    <div class="toolbar">
      <label class="sort-label">
        <span class="sr-label">フィルタ</span>
        <select id="status-filter">
          <option value="all">すべて</option>
          <option value="not_finished">読了前のみ</option>
          <option value="unread">未着手</option>
          <option value="reading">読書中</option>
          <option value="finished">読了</option>
        </select>
      </label>
      <label class="sort-label">
        <span class="sr-label">ソート</span>
        <select id="sort">
          <option value="title">タイトル順</option>
          <option value="modified">更新日時 (新しい順)</option>
          <option value="added">追加日時 (新しい順)</option>
          <option value="unread">未読優先</option>
        </select>
      </label>
      <a href="/settings.html" class="icon-btn" aria-label="設定" title="設定">⚙</a>
      <span id="status" class="status"></span>
    </div>
  </header>

  <main class="main">
    <aside class="sidebar" id="sidebar">
      <h2>ディレクトリ</h2>
      <ul id="directories" class="dir-list">
        <li><a href="#" data-dir="" class="dir-link active">すべて</a></li>
      </ul>
    </aside>
    <div id="sidebar-scrim" class="sidebar-scrim" aria-hidden="true"></div>

    <section class="content">
      <div id="grid" class="grid"></div>
      <p id="empty" class="empty" hidden>書籍が見つかりません。設定画面から再インデックスを実行してください。</p>
    </section>
  </main>

  <script type="module" src="/app.js"></script>
</body>
</html>
