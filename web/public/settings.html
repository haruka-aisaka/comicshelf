<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f1115">
  <title>comicshelf - 設定</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="topbar">
    <a href="/" class="back" aria-label="一覧に戻る">←</a>
    <h1>設定</h1>
  </header>

  <main class="settings">
    <section class="settings-card">
      <h2>ライブラリ</h2>
      <p class="settings-desc">
        ライブラリディレクトリは <code id="library-roots">読み込み中…</code> です。
        起動時と <code id="watch-interval">-</code>秒ごとに自動でインデックスが更新されます。
      </p>
      <dl class="settings-meta">
        <dt>最終実行</dt><dd id="last-run">—</dd>
        <dt>追加/更新</dt><dd id="last-upserted">—</dd>
        <dt>削除</dt><dd id="last-removed">—</dd>
        <dt>所要時間</dt><dd id="last-elapsed">—</dd>
        <dt>次回自動実行</dt><dd id="next-run">—</dd>
      </dl>
      <div class="settings-actions">
        <button id="reindex" type="button">今すぐ再インデックス</button>
        <span id="reindex-status" class="status"></span>
      </div>
    </section>

    <section class="settings-card">
      <h2>ビューワー (デフォルト設定)</h2>
      <p class="settings-desc">これらの設定はブラウザに保存されます。</p>
      <label class="settings-row">
        <span>読書方向</span>
        <select id="default-direction">
          <option value="rtl">右→左 (漫画)</option>
          <option value="ltr">左→右</option>
        </select>
      </label>
    </section>
  </main>

  <script type="module" src="/settings.js"></script>
</body>
</html>
