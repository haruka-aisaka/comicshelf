<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0f1115">
  <title>comicshelf - viewer</title>
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="stylesheet" href="/style.css">
</head>
<body class="viewer-body">
  <div id="stage" class="stage" tabindex="0">
    <button class="nav-prev" id="prev" aria-label="前のページ">‹</button>
    <div id="pages" class="pages"></div>
    <button class="nav-next" id="next" aria-label="次のページ">›</button>
    <div id="auto-progress-bar" class="auto-progress-bar" aria-hidden="true" hidden><span class="auto-progress-bar-fill"></span></div>
    <div id="progress-bar" class="progress-bar" aria-hidden="true"><span class="progress-bar-fill"></span></div>
    <div id="loader" class="loader" hidden aria-hidden="true"><div class="spinner"></div></div>
  </div>

  <!-- 中央タップで開く統合メニュー: 戻る・タイトル・進捗・シーク・設定・既読化 -->
  <div id="menu-overlay" class="menu-overlay" hidden>
    <div class="menu-row menu-header">
      <a href="/" class="back" aria-label="一覧に戻る">←</a>
      <span id="book-title" class="book-title"></span>
      <span id="page-indicator" class="page-indicator">- / -</span>
      <button type="button" id="menu-close" class="seek-close" aria-label="閉じる">×</button>
    </div>
    <div class="menu-row">
      <input type="range" id="seek-bar" min="0" max="0" value="0" step="1">
    </div>
    <div class="menu-row seek-info">
      <span class="seek-label">ページ</span>
      <input type="number" id="page-input" min="1" max="1" value="1">
      <span class="seek-total">/ <span id="seek-total">-</span></span>
    </div>
    <div class="menu-row menu-settings">
      <label>
        <span>見開き</span>
        <select id="spread-mode">
          <option value="auto">自動 (横画面のみ)</option>
          <option value="single">単ページ</option>
          <option value="spread">常に見開き</option>
        </select>
      </label>
      <label>
        <span>表示</span>
        <select id="fit">
          <option value="height">高さ</option>
          <option value="width">幅</option>
          <option value="contain">全体</option>
        </select>
      </label>
      <label>
        <span>方向</span>
        <select id="direction">
          <option value="rtl">右→左</option>
          <option value="ltr">左→右</option>
        </select>
      </label>
    </div>
    <div class="menu-row menu-auto-advance">
      <span class="auto-adv-title">自動送り</span>
      <div class="auto-adv-slider-wrap">
        <input type="range" id="auto-adv-sec" min="0" max="60" step="0.1" value="0">
      </div>
      <span id="auto-adv-value" class="auto-adv-value">OFF</span>
      <button type="button" id="auto-adv-pause" class="auto-pause-btn" hidden aria-pressed="false">
        <span class="auto-pause-icon" aria-hidden="true">‖</span>
        <span class="auto-pause-label">一時停止</span>
      </button>
    </div>
    <div class="menu-row">
      <button id="finish-and-close" type="button" class="finish-btn">既読にして閉じる</button>
    </div>
  </div>

  <script type="module" src="/viewer.js"></script>
</body>
</html>
