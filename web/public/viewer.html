<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    >
    <meta name="theme-color" content="#0f1115">
    <title>comicshelf - viewer</title>
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/icons/icon.svg">
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="/style.css">
  </head>
  <body class="viewer-body">
    <div id="stage" class="stage" tabindex="0">
      <button class="nav-prev" id="prev" aria-label="前のページ">‹</button>
      <div id="pages" class="pages"></div>
      <button class="nav-next" id="next" aria-label="次のページ">›</button>
      <div id="auto-progress-bar" class="auto-progress-bar" aria-hidden="true" hidden>
        <span class="auto-progress-bar-fill"></span>
      </div>
      <div id="progress-bar" class="progress-bar" aria-hidden="true">
        <span class="progress-bar-fill"></span>
      </div>
      <div id="loader" class="loader" hidden aria-hidden="true"><div class="spinner"></div></div>
    </div>

    <!-- メニュー枠外タップで閉じるための backdrop -->
    <div id="menu-backdrop" class="menu-backdrop" hidden></div>

    <!-- 中央タップで開く統合メニュー: 戻る・タイトル・進捗・シーク・設定・既読化 -->
    <div id="menu-overlay" class="menu-overlay" hidden>
      <div class="menu-row menu-header">
        <a href="/" class="back" aria-label="一覧に戻る">←</a>
        <span id="book-title" class="book-title"></span>
        <span id="page-indicator" class="page-indicator">- / -</span>
        <button type="button" id="menu-close" class="seek-close" aria-label="閉じる">×</button>
      </div>
      <div id="meta-panel" class="meta-panel" hidden>
        <div class="meta-row meta-favorite">
          <button id="favorite-toggle" type="button" class="favorite-btn" aria-pressed="false">
            <span class="favorite-btn-icon" aria-hidden="true">☆</span>
            <span class="favorite-btn-label">お気に入りに追加</span>
          </button>
        </div>
        <div class="meta-row" data-field="series" hidden>
          <span class="meta-label">シリーズ</span>
          <span class="meta-value"></span>
        </div>
        <div class="meta-row" data-field="author" hidden>
          <span class="meta-label">作者</span>
          <span class="meta-value"></span>
        </div>
        <div class="meta-row" data-field="tags" hidden>
          <span class="meta-label">タグ</span>
          <span class="meta-tags"></span>
        </div>
      </div>
      <div class="menu-row">
        <input type="range" id="seek-bar" min="0" max="0" value="0" step="1">
      </div>
      <div class="menu-row seek-info">
        <span class="seek-label">ページ</span>
        <input type="number" id="page-input" min="1" max="1" value="1">
        <span class="seek-total">/ <span id="seek-total">-</span></span>
      </div>
      <div class="menu-row menu-settings">
        <label>
          <span>見開き</span>
          <select id="spread-mode">
            <option value="auto">自動 (横画面のみ)</option>
            <option value="single">単ページ</option>
            <option value="spread">常に見開き</option>
          </select>
        </label>
        <label>
          <span>表示</span>
          <select id="fit">
            <option value="height">高さ</option>
            <option value="width">幅</option>
            <option value="contain">全体</option>
          </select>
        </label>
        <label>
          <span>方向</span>
          <select id="direction">
            <option value="rtl">右→左</option>
            <option value="ltr">左→右</option>
          </select>
        </label>
      </div>
      <div class="menu-row menu-auto-advance">
        <span class="auto-adv-title">自動送り</span>
        <div class="auto-adv-slider-wrap">
          <input type="range" id="auto-adv-sec" min="1.5" max="12" step="0.1" value="1.5">
        </div>
        <span id="auto-adv-value" class="auto-adv-value">1.0 秒</span>
        <button type="button" id="auto-adv-pause" class="auto-pause-btn" aria-pressed="true">
          <span class="auto-pause-icon" aria-hidden="true">▶</span>
          <span class="auto-pause-label">再開</span>
        </button>
      </div>
      <div class="menu-row menu-cover" id="menu-cover-row" hidden>
        <button id="cover-set-btn" type="button" class="cover-btn">
          このページを表紙に設定
        </button>
        <button id="cover-clear-btn" type="button" class="cover-btn cover-clear-btn" hidden>
          表紙設定を解除
        </button>
      </div>
      <div class="menu-row">
        <button id="finish-and-close" type="button" class="finish-btn" hidden>
          既読にして閉じる
        </button>
      </div>
    </div>

    <!-- 操作フィードバック用 toast (お気に入り / 表紙設定など) -->
    <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

    <!-- 最終ページで「次へ」操作した時の既読化モーダル -->
    <div id="finish-modal-backdrop" class="finish-modal-backdrop" hidden></div>
    <div
      id="finish-modal"
      class="finish-modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="finish-modal-title"
      hidden
    >
      <p id="finish-modal-title" class="finish-modal-title">最後のページです</p>
      <p class="finish-modal-body">この本を閉じますか?</p>
      <div class="finish-modal-actions">
        <button type="button" id="finish-modal-confirm" class="finish-modal-confirm">
          閉じる
        </button>
        <button
          type="button"
          id="finish-modal-favorite-confirm"
          class="finish-modal-confirm finish-modal-favorite"
        >
          <span class="finish-modal-fav-icon" aria-hidden="true">★</span>
          <span class="finish-modal-fav-label">お気に入りに加えて閉じる</span>
        </button>
        <button type="button" id="finish-modal-cancel" class="finish-modal-cancel">
          キャンセル
        </button>
      </div>
    </div>

    <script type="module" src="/viewer.js"></script>
  </body>
</html>
